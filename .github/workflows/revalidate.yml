name: Revalidate NBA Data

on:
  schedule:
    # Every day at 16:00 JST (07:00 UTC) - after most NBA games end
    - cron: "0 7 * * *"
    # Every day at 07:00 JST (22:00 UTC previous day) - morning refresh
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  revalidate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger revalidation
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.REVALIDATION_TOKEN }}" \
            "${{ vars.SITE_URL }}/api/revalidate")

          echo "Status: $RESPONSE"
          if [ "$RESPONSE" -ne 200 ]; then
            echo "Revalidation failed with status $RESPONSE"
            exit 1
          fi
          echo "Revalidation successful"
