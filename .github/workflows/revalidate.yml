name: Update NBA Data

on:
  schedule:
    # Every day at 16:00 JST (07:00 UTC) - after most NBA games end
    - cron: "0 7 * * *"
    # Every day at 07:00 JST (22:00 UTC previous day) - morning refresh
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest NBA data
        run: node scripts/fetch-data.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "Auto-update NBA data [skip ci]"
          git push

      - name: Trigger Vercel revalidation
        if: vars.SITE_URL != ''
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.REVALIDATION_TOKEN }}" \
            "${{ vars.SITE_URL }}/api/revalidate")
          echo "Revalidation status: $RESPONSE"
